name: Release

on:
  push:
    branches:
      - main
    paths:
      - '**.conf'
      - '**.sh'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build tarball
        run: |
          mkdir tmux
          cp *.conf *.sh tmux/
          tar -czf tmux-thc.tar.gz tmux/

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ steps.sha.outputs.short }}
          name: Release ${{ steps.sha.outputs.short }}
          files: tmux-thc.tar.gz
          make_latest: true
